<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Spectral:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  .vhead{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 7vw;transition:background .35s,backdrop-filter .35s,border-color .35s;border-bottom:1px solid transparent}
  .vhead.scrolled{background:rgba(18,14,10,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(201,168,106,.18)}
  .vhlink{transition:color .25s}
  .vhlink:hover{color:#f3ece0 !important}
  .vh-burger{display:none;background:transparent;border:none;color:#c9a86a;font-size:22px;line-height:1;cursor:pointer;padding:4px 6px}
  .vh-nav{display:flex;align-items:center;gap:28px}
  .vh-links{display:flex;gap:22px;font:400 13px Spectral,serif;letter-spacing:.5px}
  .vh-langs{display:flex;align-items:center;gap:3px;border-left:1px solid rgba(201,168,106,.3);padding-left:16px}
  @media(max-width:820px){
    .vh-burger{display:block}
    .vh-nav{position:fixed;top:59px;left:0;right:0;flex-direction:column;align-items:flex-start;gap:16px;background:rgba(16,12,9,.98);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,106,.18);padding:22px 7vw 26px;transform:translateY(-130%);transition:transform .32s cubic-bezier(.2,.7,.2,1);pointer-events:none}
    .vh-nav.open{transform:translateY(0);pointer-events:auto}
    .vh-links{flex-direction:column;gap:18px;font-size:16px}
    .vh-langs{border-left:none;padding-left:0;margin-top:4px}
  }
</style>
</helmet>
<header class="vhead {{ headScrolled }}">
  <a href="Главная.dc.html" style="font:400 18px Forum,serif;color:#f3ece0;letter-spacing:3px;text-decoration:none">{{ brand }}</a>
  <button class="vh-burger" aria-label="Меню" onClick="{{ toggle }}">{{ burger }}</button>
  <div class="vh-nav {{ navOpen }}">
    <div class="vh-links">
      <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="5">
        <a href="{{ n.href }}" class="vhlink" style="{{ n.style }}">{{ n.label }}</a>
      </sc-for>
    </div>
    <div class="vh-langs">
      <sc-for list="{{ langBtns }}" as="lb" hint-placeholder-count="4">
        <button onClick="{{ lb.onSelect }}" style="{{ lb.style }}">{{ lb.label }}</button>
      </sc-for>
    </div>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:68},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;ru&quot;,&quot;en&quot;,&quot;uk&quot;,&quot;bg&quot;],&quot;default&quot;:&quot;ru&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;&quot;,&quot;books&quot;,&quot;author&quot;,&quot;blog&quot;,&quot;news&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onLang&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(code:string)=&gt;void&quot;}}">
class Component extends DCLogic {
  LANGS = [{code:'en',label:'EN'},{code:'uk',label:'UK'},{code:'ru',label:'RU'},{code:'bg',label:'BG'}];
  NAV = [
    {key:'books',  href:'Главная.dc.html#books'},
    {key:'author', href:'Об авторе.dc.html'},
    {key:'blog',   href:'Блог.dc.html'},
    {key:'news',   href:'Новости.dc.html'},
    {key:'contact',href:'Контакты.dc.html'},
  ];
  CH = {
    ru:{brand:'Р·ВИШНЕВСКИЙ',nav:{books:'Книги',author:'Автор',blog:'Блог',news:'Новости',contact:'Контакты'}},
    en:{brand:'R·VYSHNEVSKYI',nav:{books:'Books',author:'Author',blog:'Blog',news:'News',contact:'Contact'}},
    uk:{brand:'Р·ВИШНЕВСЬКИЙ',nav:{books:'Книги',author:'Автор',blog:'Блог',news:'Новини',contact:'Контакти'}},
    bg:{brand:'Р·ВИШНЕВСКИ',nav:{books:'Книги',author:'Автор',blog:'Блог',news:'Новини',contact:'Контакти'}},
  };
  state = { scrolled:false, open:false };
  constructor(p){ super(p); this.onScroll=this.onScroll.bind(this); }
  componentDidMount(){ window.addEventListener('scroll',this.onScroll,{passive:true}); }
  componentWillUnmount(){ window.removeEventListener('scroll',this.onScroll); }
  onScroll(){ const s=window.scrollY>40; if(s!==this.state.scrolled) this.setState({scrolled:s}); }
  renderVals(){
    const lang = this.CH[this.props.lang] ? this.props.lang : 'ru';
    const active = this.props.active || '';
    const onLang = this.props.onLang || function(){};
    const c = this.CH[lang];
    const navItems = this.NAV.map(n=>({href:n.href,label:c.nav[n.key],
      style:'color:'+(n.key===active?'#f3ece0':'#c9bda8')+';text-decoration:none;'}));
    const langBtns = this.LANGS.map(l=>({label:l.label,onSelect:()=>{ onLang(l.code); this.setState({open:false}); },
      style:'cursor:pointer;background:transparent;font:400 12px Spectral,serif;letter-spacing:1px;padding:5px 9px;border-radius:2px;border:1px solid '+(l.code===lang?'rgba(201,168,106,.7)':'transparent')+';color:'+(l.code===lang?'#f0d8a8':'#8a8070')+';transition:color .2s,border-color .2s;'}));
    return { brand:c.brand, navItems, langBtns, headScrolled:this.state.scrolled?'scrolled':'',
      navOpen:this.state.open?'open':'', burger:this.state.open?'✕':'☰',
      toggle:()=>this.setState(s=>({open:!s.open})) };
  }
}
</script>
</body>
</html>
