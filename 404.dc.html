<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<title>404 · Страница не найдена · Ростислав Вишневский</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Spectral:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html{scroll-behavior:smooth}
  body{margin:0;background:#14110d;-webkit-font-smoothing:antialiased}
  @keyframes vfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .vbtn{transition:transform .25s,background .25s,color .25s,border-color .25s}
  .vbtn:hover{transform:translateY(-2px)}
  .vlink{transition:color .25s}.vlink:hover{color:#f3ece0 !important}
</style>
</helmet>

<div style="font-family:Spectral,serif;color:#ece4d6;background:#14110d;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden">

  <header style="display:flex;align-items:center;justify-content:space-between;padding:22px 7vw;position:relative;z-index:2">
    <a href="Главная.dc.html" style="font:400 18px Forum,serif;color:#f3ece0;letter-spacing:3px;text-decoration:none">{{ t.brand }}</a>
    <div style="display:flex;align-items:center;gap:3px">
      <sc-for list="{{ langBtns }}" as="lb" hint-placeholder-count="4">
        <button onClick="{{ lb.onSelect }}" style="{{ lb.style }}">{{ lb.label }}</button>
      </sc-for>
    </div>
  </header>

  <main style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 7vw 70px;position:relative">
    <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(210,104,63,.26),rgba(210,104,63,0) 70%);animation:vfloat 8s ease-in-out infinite;pointer-events:none"></div>
    <div style="position:relative">
      <div style="font:400 clamp(90px,18vw,200px) Forum,serif;color:#c9a86a;line-height:.9;letter-spacing:4px;text-shadow:0 6px 40px rgba(0,0,0,.6)">404</div>
      <div style="font:400 11px Spectral,serif;color:#b8935a;letter-spacing:6px;margin:18px 0 18px">{{ t.kicker }}</div>
      <h1 style="font:400 clamp(28px,4.6vw,52px) Forum,serif;color:#f3ece0;margin:0 0 20px;line-height:1.1;max-width:680px">{{ t.title }}</h1>
      <p style="font:300 clamp(15px,2vw,19px)/1.65 Spectral,serif;color:#a89c84;max-width:500px;margin:0 auto 38px">{{ t.text }}</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <a href="Главная.dc.html" class="vbtn" style="background:#c9a86a;color:#1a1410;font:500 13px Spectral,serif;letter-spacing:1px;padding:15px 32px;text-decoration:none;border-radius:2px">{{ t.btnHome }}</a>
        <a href="Книга — Просто вернуться домой.dc.html" class="vbtn" style="border:1px solid rgba(201,168,106,.45);color:#e3d6bd;font:400 13px Spectral,serif;letter-spacing:1px;padding:15px 32px;text-decoration:none;border-radius:2px">{{ t.btnBook }}</a>
      </div>
    </div>
  </main>

  <footer style="padding:30px 7vw;border-top:1px solid rgba(201,168,106,.14);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px">
    <div style="font:300 12px Spectral,serif;color:#6b6152">© 2026 · {{ t.rights }}</div>
    <a href="Контакты.dc.html" class="vlink" style="font:300 13px Spectral,serif;color:#c9bda8;text-decoration:none">{{ t.contact }}</a>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  LANGS = [{code:'en',label:'EN'},{code:'uk',label:'UK'},{code:'ru',label:'RU'},{code:'bg',label:'BG'}];
  DICT = {
    ru:{brand:'Р·ВИШНЕВСКИЙ',kicker:'СТРАНИЦА НЕ НАЙДЕНА',title:'Вы свернули не в тот мир',text:'Этой страницы не существует — как города, который не найти без проводника. Но дорога домой всегда открыта.',btnHome:'Вернуться домой',btnBook:'К книге',rights:'Все права защищены',contact:'Написать автору →'},
    en:{brand:'R·VYSHNEVSKYI',kicker:'PAGE NOT FOUND',title:'You turned into the wrong world',text:'This page does not exist — like a city you cannot find without a guide. But the road home is always open.',btnHome:'Return home',btnBook:'To the book',rights:'All rights reserved',contact:'Write to the author →'},
    uk:{brand:'Р·ВИШНЕВСЬКИЙ',kicker:'СТОРІНКУ НЕ ЗНАЙДЕНО',title:'Ви звернули не в той світ',text:'Цієї сторінки не існує — як міста, що його не знайти без провідника. Та дорога додому завжди відкрита.',btnHome:'Повернутися додому',btnBook:'До книги',rights:'Усі права захищені',contact:'Написати автору →'},
    bg:{brand:'Р·ВИШНЕВСКИ',kicker:'СТРАНИЦАТА НЕ Е НАМЕРЕНА',title:'Свърнахте в погрешния свят',text:'Тази страница не съществува — като град, който не можеш да намериш без водач. Но пътят към дома винаги е отворен.',btnHome:'Към дома',btnBook:'Към книгата',rights:'Всички права запазени',contact:'Пишете на автора →'},
  };
  state={lang:'ru'};
  componentDidMount(){try{const s=localStorage.getItem('vish_lang');if(s&&this.DICT[s])this.setState({lang:s});}catch(e){}}
  setLang(c){try{localStorage.setItem('vish_lang',c);}catch(e){}this.setState({lang:c});}
  renderVals(){
    const lang=this.state.lang;
    const langBtns=this.LANGS.map(l=>{const a=l.code===lang;return{label:l.label,onSelect:()=>this.setLang(l.code),style:'cursor:pointer;background:transparent;font:400 12px Spectral,serif;letter-spacing:1px;padding:5px 9px;border-radius:2px;border:1px solid '+(a?'rgba(201,168,106,.7)':'transparent')+';color:'+(a?'#f0d8a8':'#8a8070')+';'};});
    return {t:this.DICT[lang],langBtns};
  }
}
</script>
</body>
</html>
