        {img:'assets/img/blog-6.jpg',cat:'ФИЛОСОФИЯ',meta:'10 мин',title:'Дълг, род и съдба: за какво всъщност е тази книга',excerpt:'Под бойните сцени стои въпрос за наследството и личния избор. Защо фентъзито говори за самите нас.'},
      ],
      subKicker:'ОСТАНЕТЕ В СВЕТА', subTitle:'Нови глави и бележки — на пощата',
      subText:'Абонирайте се, за да получавате първи нови истории от света на Толус и новини за следващите книги.',
      subPlaceholder:'Вашата поща', subBtn:'Абонирай се', subOk:'Готово! Проверете пощата — абонирани сте.',
      footTagline:'Истории за дълг, наследство и лична съдба — там, където се срещат бойните изкуства, магията и философията.',
      footContactTitle:'КОНТАКТ', footCity:'гр. Варна, България', footLangTitle:'ЕЗИК', footRights:'Всички права запазени',
    },
  };

  state = { lang:'ru', scrolled:false, cat:'all' };

  constructor(props){ super(props); this.onScroll=this.onScroll.bind(this); }
  componentDidMount(){
    try{const s=localStorage.getItem('vish_lang');if(s&&this.DICT[s])this.setState({lang:s});}catch(e){}
    window.addEventListener('scroll',this.onScroll,{passive:true});
  }
  componentWillUnmount(){ window.removeEventListener('scroll',this.onScroll); }
  onScroll(){ const s=window.scrollY>40; if(s!==this.state.scrolled) this.setState({scrolled:s}); }
  setLang(c){ try{localStorage.setItem('vish_lang',c);}catch(e){} this.setState({lang:c}); }

  renderVals(){
    const lang=this.state.lang, t=this.DICT[lang];
    const langBtns=this.LANGS.map(l=>{
      const a=l.code===lang;
      return {label:l.label,onSelect:()=>this.setLang(l.code),
        style:'cursor:pointer;background:transparent;font:400 12px Spectral,serif;letter-spacing:1px;padding:5px 9px;border-radius:2px;border:1px solid '+(a?'rgba(201,168,106,.7)':'transparent')+';color:'+(a?'#f0d8a8':'#8a8070')+';transition:color .2s,border-color .2s;'};
    });
    // category chips
    const cats=['all'];
    t.posts.forEach(p=>{ if(!cats.includes(p.cat)) cats.push(p.cat); });
    const chips=cats.map(c=>{
      const active=this.state.cat===c;
      const label=c==='all'?t.catAll:c;
      return {label,onSelect:()=>this.setState({cat:c}),
        style:'background:'+(active?'#c9a86a':'transparent')+';color:'+(active?'#1a1410':'#a89c84')+';border:1px solid '+(active?'#c9a86a':'rgba(201,168,106,.3)')+';font:400 12px Spectral,serif;letter-spacing:1px;padding:8px 16px;border-radius:2px;'};
    });
    const withLink=t.posts.map((p,i)=>Object.assign({},p,{link:'article.html?id='+(i+2)}));
    const gridPosts=this.state.cat==='all'?withLink:withLink.filter(p=>p.cat===this.state.cat);
    return {
      t, langBtns, chips, gridPosts,
      headScrolled:this.state.scrolled?'scrolled':'',lang:this.state.lang,setLang:(c)=>this.setLang(c),subbed:this.state.subbed,notSubbed:!this.state.subbed,onSub:(e)=>{e.preventDefault();this.setState({subbed:true});},
      hideImg:(e)=>{e.target.style.display='none';},
    };
  }
}
</script>
