<body>
<x-dc>
<helmet>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Spectral:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);-webkit-font-smoothing:antialiased}
  @keyframes vfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .vbtn{transition:transform .25s,background .25s,color .25s,border-color .25s}
  .vbtn:hover{transform:translateY(-2px)}
  .vlink{transition:color .25s}.vlink:hover{color:var(--c-paper-50) !important}
</style>
</helmet>

<div style="font-family:Spectral,serif;color:var(--text);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden">

  <dc-import name="SiteHeader" lang="{{ lang }}" active="" on-lang="{{ setLang }}" hint-size="100%,66px"></dc-import>

  <main style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 7vw 80px;position:relative">
    <div style="position:absolute;top:6%;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(210,104,63,.28),rgba(210,104,63,0) 70%);animation:vfloat 8s ease-in-out infinite;pointer-events:none"></div>
    <div style="position:relative">
      <div style="font:400 11px Spectral,serif;color:var(--gold-text);letter-spacing:6px;margin-bottom:24px">{{ t.kicker }}</div>
      <h1 style="font:400 clamp(34px,5.4vw,62px) Forum,serif;color:var(--c-paper-50);margin:0 0 22px;line-height:1.08;max-width:760px">{{ t.title }}</h1>
      <p style="font:300 clamp(15px,2vw,19px)/1.65 Spectral,serif;color:#a89c84;max-width:520px;margin:0 auto 38px">{{ t.text }}</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <a href="index.html" class="vbtn" style="background:var(--gold);color:var(--bg-2);font:500 14.5px Spectral,serif;letter-spacing:1px;padding:15px 32px;text-decoration:none;border-radius:2px">{{ t.btnHome }}</a>
        <a href="blog.html" class="vbtn" style="border:1px solid rgba(var(--gold-rgb),.45);color:#e3d6bd;font:400 14.5px Spectral,serif;letter-spacing:1px;padding:15px 32px;text-decoration:none;border-radius:2px">{{ t.btnBlog }}</a>
      </div>
    </div>
  </main>

  <footer style="padding:30px 7vw;border-top:1px solid rgba(var(--gold-rgb),.14);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px">
    <div style="font:300 12px Spectral,serif;color:var(--text-faintest)">© 2026 · {{ t.rights }}</div>
    <a href="contacts.html" class="vlink" style="font:300 13px Spectral,serif;color:var(--text-dim);text-decoration:none">{{ t.contact }}</a>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  LANGS = [{code:'en',label:'EN'},{code:'uk',label:'UK'},{code:'ru',label:'RU'},{code:'bg',label:'BG'}];
  DICT = {
    ru:{brand:'Р·ВИШНЕВСКИЙ',kicker:'СТРАНИЦА ГОТОВИТСЯ',title:'Эта часть мира ещё создаётся',text:'Мы дописываем эту страницу. Загляните чуть позже — или вернитесь туда, где история уже началась.',btnHome:'На главную',btnBlog:'Читать блог',rights:'Все права защищены',contact:'Написать автору →'},
    en:{brand:'R·VYSHNEVSKYI',kicker:'PAGE IN PROGRESS',title:'This part of the world is still being written',text:'We are finishing this page. Come back a little later — or return to where the story has already begun.',btnHome:'Home',btnBlog:'Read the blog',rights:'All rights reserved',contact:'Write to the author →'},
    uk:{brand:'Р·ВИШНЕВСЬКИЙ',kicker:'СТОРІНКА ГОТУЄТЬСЯ',title:'Ця частина світу ще створюється',text:'Ми дописуємо цю сторінку. Завітайте трохи згодом — або поверніться туди, де історія вже почалася.',btnHome:'На головну',btnBlog:'Читати блог',rights:'Усі права захищені',contact:'Написати автору →'},
    bg:{brand:'Р·ВИШНЕВСКИ',kicker:'СТРАНИЦАТА СЕ ПОДГОТВЯ',title:'Тази част от света още се създава',text:'Дописваме тази страница. Наминете малко по-късно — или се върнете там, където историята вече е започнала.',btnHome:'Към начало',btnBlog:'Към блога',rights:'Всички права запазени',contact:'Пишете на автора →'},
  };
  state={lang:'ru'};
  componentDidMount(){try{const s=localStorage.getItem('vish_lang');if(s&&this.DICT[s])this.setState({lang:s});}catch(e){}}
  setLang(c){try{localStorage.setItem('vish_lang',c);}catch(e){}this.setState({lang:c});}
  renderVals(){
    const lang=this.state.lang;
    return {t:this.DICT[lang], lang, setLang:(c)=>this.setLang(c)};
  }
}
</script>
</body>
</html>
