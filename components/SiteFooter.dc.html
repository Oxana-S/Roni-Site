<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="styles/theme.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Spectral:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  .vflink{transition:color .25s}
  .vflink:hover{color:#f3ece0 !important}
  .vsoc{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;border:1px solid rgba(201,168,106,.3);color:#c9a86a;text-decoration:none;transition:transform .25s,color .25s,border-color .25s}
  .vsoc:hover{transform:translateY(-2px);color:#f0d8a8;border-color:rgba(201,168,106,.7)}
</style>
</helmet>
<footer style="background:#0d0b08;padding:60px 7vw 38px;border-top:1px solid rgba(201,168,106,.14);font-family:Spectral,serif">
  <div style="max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:40px">
    <div style="max-width:330px">
      <div style="font:400 18px Forum,serif;color:#f3ece0;letter-spacing:3px;margin-bottom:14px">{{ c.brand }}</div>
      <p style="font:300 14px/1.7 Spectral,serif;color:#8a8070;margin:0 0 22px">{{ c.footTagline }}</p>
      <div style="display:flex;gap:10px">
        <a href="https://www.facebook.com/rostyslavvyshnevskyi/" target="_blank" rel="noopener" aria-label="Facebook" class="vsoc"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15 8h2V5h-2.5C12.6 5 11 6.6 11 8.5V10H9v3h2v7h3v-7h2.2l.5-3H14V9c0-.6.4-1 1-1z"></path></svg></a>
        <a href="dev.html" aria-label="Instagram" class="vsoc"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"></circle></svg></a>
        <a href="dev.html" aria-label="YouTube" class="vsoc"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22 7.5c-.2-1-.9-1.7-1.9-2C18.3 5 12 5 12 5s-6.3 0-8.1.5c-1 .3-1.7 1-1.9 2C1.5 9.3 1.5 12 1.5 12s0 2.7.5 4.5c.2 1 .9 1.7 1.9 2C5.7 19 12 19 12 19s6.3 0 8.1-.5c1-.3 1.7-1 1.9-2 .5-1.8.5-4.5.5-4.5s0-2.7-.5-4.5z"></path><path d="M10 15l5-3-5-3z" fill="#0d0b08"></path></svg></a>
      </div>
    </div>
    <div>
      <div style="font:400 11px Spectral,serif;color:#b8935a;letter-spacing:3px;margin-bottom:16px">{{ c.footNav }}</div>
      <div style="display:flex;flex-direction:column;gap:9px;font:300 14px Spectral,serif">
        <a href="book.html" class="vflink" style="color:#c9bda8;text-decoration:none">{{ c.nav.books }}</a>
        <a href="about.html" class="vflink" style="color:#c9bda8;text-decoration:none">{{ c.nav.author }}</a>
        <a href="blog.html" class="vflink" style="color:#c9bda8;text-decoration:none">{{ c.nav.blog }}</a>
        <a href="news.html" class="vflink" style="color:#c9bda8;text-decoration:none">{{ c.nav.news }}</a>
        <a href="reviews.html" class="vflink" style="color:#c9bda8;text-decoration:none">{{ c.reviews }}</a>
      </div>
    </div>
    <div>
      <div style="font:400 11px Spectral,serif;color:#b8935a;letter-spacing:3px;margin-bottom:16px">{{ c.footContactTitle }}</div>
      <div style="display:flex;flex-direction:column;gap:9px;font:300 14px Spectral,serif;color:#c9bda8">
        <a href="mailto:rostvish.bg@gmail.com" class="vflink" style="color:#c9bda8;text-decoration:none">rostvish.bg@gmail.com</a>
        <a href="tel:+359892903386" class="vflink" style="color:#c9bda8;text-decoration:none">+359 892 903 386</a>
        <span style="color:#8a8070">{{ c.footCity }}</span>
        <a href="contacts.html" class="vflink" style="color:#c9a86a;text-decoration:none;margin-top:4px">{{ c.writeBtn }}</a>
      </div>
    </div>
  </div>
  <div style="max-width:1180px;margin:44px auto 0;padding-top:22px;border-top:1px solid rgba(201,168,106,.1);font:300 12px Spectral,serif;color:#6b6152">© 2026 · {{ c.footRights }}</div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:320},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;ru&quot;,&quot;en&quot;,&quot;uk&quot;,&quot;bg&quot;],&quot;default&quot;:&quot;ru&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  CH = {
    ru:{brand:'Р·ВИШНЕВСКИЙ',nav:{books:'Книги',author:'Автор',blog:'Блог',news:'Новости'},reviews:'Отзывы',
      footTagline:'Истории о долге, наследии и личной судьбе — на стыке боевых искусств, магии и философии.',
      footNav:'РАЗДЕЛЫ',footContactTitle:'КОНТАКТ',footCity:'г. Варна, Болгария',writeBtn:'Написать автору →',footRights:'Все права защищены'},
    en:{brand:'R·VYSHNEVSKYI',nav:{books:'Books',author:'Author',blog:'Blog',news:'News'},reviews:'Reviews',
      footTagline:'Stories of duty, heritage and personal fate — where martial arts, magic and philosophy meet.',
      footNav:'SECTIONS',footContactTitle:'CONTACT',footCity:'Varna, Bulgaria',writeBtn:'Write to the author →',footRights:'All rights reserved'},
    uk:{brand:'Р·ВИШНЕВСЬКИЙ',nav:{books:'Книги',author:'Автор',blog:'Блог',news:'Новини'},reviews:'Відгуки',
      footTagline:'Історії про обов’язок, спадок і власну долю — на перетині бойових мистецтв, магії та філософії.',
      footNav:'РОЗДІЛИ',footContactTitle:'КОНТАКТ',footCity:'м. Варна, Болгарія',writeBtn:'Написати авторові →',footRights:'Усі права захищені'},
    bg:{brand:'Р·ВИШНЕВСКИ',nav:{books:'Книги',author:'Автор',blog:'Блог',news:'Новини'},reviews:'Отзиви',
      footTagline:'Истории за дълг, наследство и лична съдба — там, където се срещат бойните изкуства, магията и философията.',
      footNav:'РАЗДЕЛИ',footContactTitle:'КОНТАКТ',footCity:'гр. Варна, България',writeBtn:'Пишете на автора →',footRights:'Всички права запазени'},
  };
  renderVals(){
    const lang = this.CH[this.props.lang] ? this.props.lang : 'ru';
    return { c:this.CH[lang] };
  }
}
</script>
</body>
</html>
