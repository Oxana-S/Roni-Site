<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="styles/theme.css">
<title>Шаблон страницы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Spectral:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);-webkit-font-smoothing:antialiased}
  .vbtn{transition:transform .25s,background .25s,color .25s,border-color .25s}
  .vbtn:hover{transform:translateY(-2px)}
</style>
</helmet>

<div style="font-family:Spectral,serif;color:var(--text);background:var(--bg);overflow-x:hidden;min-height:100vh">

  <!-- ШАПКА (общий компонент) -->
  <dc-import name="SiteHeader" lang="{{ lang }}" active="" on-lang="{{ setLang }}" hint-size="100%,66px"></dc-import>

  <!-- HERO: кикер + заголовок + вступление -->
  <section style="max-width:var(--container);margin:0 auto;padding:150px 7vw 40px">
    <div style="font:400 11px Spectral,serif;color:#b8935a;letter-spacing:5px;margin-bottom:18px">{{ t.kicker }}</div>
    <h1 style="font:400 clamp(34px,5.4vw,60px) Forum,serif;color:var(--c-paper-50);margin:0 0 16px;line-height:1.05">{{ t.title }}</h1>
    <p style="font:300 clamp(15px,2vw,19px)/1.7 Spectral,serif;color:#a89c84;max-width:620px;margin:0">{{ t.intro }}</p>
  </section>

  <!-- СЕКЦИЯ: текст + медиа (адаптивная, в 2 колонки → в 1 на мобиле) -->
  <section style="max-width:var(--container);margin:0 auto;padding:50px 7vw;border-top:1px solid rgba(201,168,106,.12)">
    <div style="display:flex;gap:48px;align-items:center;flex-wrap:wrap">
      <div style="flex:1;min-width:280px">
        <div style="font:400 11px Spectral,serif;color:#b8935a;letter-spacing:4px;margin-bottom:16px">{{ t.secKicker }}</div>
        <h2 style="font:400 clamp(26px,3.6vw,40px) Forum,serif;color:#f0e6d2;margin:0 0 18px">{{ t.secTitle }}</h2>
        <p style="font:300 16px/1.8 Spectral,serif;color:#c2b6a0;margin:0 0 16px">{{ t.p1 }}</p>
        <p style="font:300 16px/1.8 Spectral,serif;color:#c2b6a0;margin:0">{{ t.p2 }}</p>
      </div>
      <div style="flex:1;min-width:280px;aspect-ratio:4/3;border:1px solid rgba(201,168,106,.2);border-radius:4px;background:repeating-linear-gradient(45deg,#1c1812,#1c1812 8px,#191510 8px,#191510 16px);display:flex;align-items:center;justify-content:center;font:300 12px Spectral,serif;color:#6b6152">{{ t.media }}</div>
    </div>
  </section>

  <!-- CTA -->
  <section style="max-width:var(--container);margin:0 auto;padding:40px 7vw 90px">
    <div style="text-align:center;border:1px solid rgba(201,168,106,.2);border-radius:4px;padding:clamp(36px,6vw,54px) 28px;background:radial-gradient(120% 100% at 50% 0,rgba(201,168,106,.05),transparent)">
      <h2 style="font:400 clamp(24px,3.4vw,38px) Forum,serif;color:#f0e6d2;margin:0 0 14px">{{ t.ctaTitle }}</h2>
      <p style="font:300 16px/1.6 Spectral,serif;color:#a89c84;margin:0 auto 30px;max-width:440px">{{ t.ctaText }}</p>
      <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
        <a href="#" class="vbtn" style="background:var(--gold);color:var(--bg-2);font:500 14.5px Spectral,serif;letter-spacing:1px;padding:15px 32px;text-decoration:none;border-radius:2px">{{ t.ctaPrimary }}</a>
        <a href="#" class="vbtn" style="border:1px solid rgba(201,168,106,.45);color:#e3d6bd;font:400 14.5px Spectral,serif;letter-spacing:1px;padding:15px 32px;text-decoration:none;border-radius:2px">{{ t.ctaSecondary }}</a>
      </div>
    </div>
  </section>

  <!-- ПОДВАЛ (общий компонент) -->
  <dc-import name="SiteFooter" lang="{{ lang }}" hint-size="100%,320px"></dc-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  // Тексты на 4 языках — скопируйте этот шаблон в корень проекта и замените содержимое.
  DICT = {
    ru:{kicker:'РАЗДЕЛ',title:'Заголовок страницы',intro:'Короткое вступление в одну-две строки: о чём эта страница.',secKicker:'ПОДРАЗДЕЛ',secTitle:'Заголовок секции',p1:'Первый абзац текста. Типографика и отступы уже заданы дизайн-системой.',p2:'Второй абзац. На мобильном колонки складываются в одну автоматически.',media:'медиа / изображение',ctaTitle:'Призыв к действию',ctaText:'Короткое пояснение под призывом.',ctaPrimary:'Основная',ctaSecondary:'Вторичная'},
    en:{kicker:'SECTION',title:'Page title',intro:'A short one-or-two-line intro: what this page is about.',secKicker:'SUBSECTION',secTitle:'Section title',p1:'First paragraph. Typography and spacing already come from the design system.',p2:'Second paragraph. On mobile the columns stack into one automatically.',media:'media / image',ctaTitle:'Call to action',ctaText:'A short line under the call to action.',ctaPrimary:'Primary',ctaSecondary:'Secondary'},
    uk:{kicker:'РОЗДІЛ',title:'Заголовок сторінки',intro:'Короткий вступ на один-два рядки: про що ця сторінка.',secKicker:'ПІДРОЗДІЛ',secTitle:'Заголовок секції',p1:'Перший абзац тексту. Типографіка й відступи вже задані дизайн-системою.',p2:'Другий абзац. На мобільному колонки складаються в одну автоматично.',media:'медіа / зображення',ctaTitle:'Заклик до дії',ctaText:'Короткий рядок під закликом.',ctaPrimary:'Основна',ctaSecondary:'Вторинна'},
    bg:{kicker:'РАЗДЕЛ',title:'Заглавие на страницата',intro:'Кратко въведение в един-два реда: за какво е тази страница.',secKicker:'ПОДРАЗДЕЛ',secTitle:'Заглавие на секция',p1:'Първи абзац. Типографията и отстъпите вече идват от дизайн-системата.',p2:'Втори абзац. На мобилно колоните се подреждат в една автоматично.',media:'медия / изображение',ctaTitle:'Призив за действие',ctaText:'Кратък ред под призива.',ctaPrimary:'Основна',ctaSecondary:'Вторична'},
  };
  state = { lang:'ru' };
  componentDidMount(){ try{const s=localStorage.getItem('vish_lang'); if(s&&this.DICT[s]) this.setState({lang:s});}catch(e){} }
  setLang(c){ try{localStorage.setItem('vish_lang',c);}catch(e){} this.setState({lang:c}); }
  renderVals(){
    const lang = this.DICT[this.state.lang] ? this.state.lang : 'ru';
    return { t:this.DICT[lang], lang:lang, setLang:(c)=>this.setLang(c) };
  }
}
</script>
</body>
</html>
